{% extends 'base.html' %}
{% load static %}
{% block title %}Sign Out — The Obsidian{% endblock %}
{% block body_class %}no-sparkle{% endblock %}
{% block content %}
<div class="signout-wrap">
  <div class="signout-card">
    <span class="diamond">◆</span>
    <h1>Until next time.</h1>
    <p>Are you sure you would like to sign out of The Obsidian?</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <div class="signout-actions">
        <button type="submit" class="btn btn-gold">Sign Out</button>
        <a href="{% url 'core:home' %}" class="btn btn-ghost">Return to Website</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
